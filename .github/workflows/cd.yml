name: cd

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
      
      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{secrets.GCP_CREDENTIALS}}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v3'

      - name: 'Use gcloud CLI'
        run: 'gcloud info'

      - name: 'Build to Artifact Registry'
        run: gcloud builds submit --tag europe-west1-docker.pkg.dev/qwiklabs-gcp-03-530540bf76ac/notely-ar-repo/test:latest .
      

      - name: 'Run Migrations'
        run: npm run db:migrate

      - name: Deploy to Cloud Run
        run: gcloud run deploy notely --image europe-west1-docker.pkg.dev/qwiklabs-gcp-01-3f9e91652398/notely-ar-repo/test:latest --region europe-west1 --allow-unauthenticated --project qwiklabs-gcp-01-3f9e91652398 --max-instances=4

      